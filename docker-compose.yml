---
version: '3.2'

services:
  app:
    build:
      context: .docker/app
      dockerfile: Dockerfile
    ports:
      - 80:80
    volumes:
      - "./:/var/www/app"

  mysql:
    image: mysql:8.0
    ports:
      - 3306:3306
    environment:
      TZ: Asia/Tokyo
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: root
      MYSQL_ROOT_HOST: "%"
    volumes:
      - "mysql:/var/lib/mysql"

volumes:
    mysql:
